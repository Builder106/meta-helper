name: CI

# MetaHelper CI — an AI programming assistant for Meta Ray-Ban glasses.
# Backend: Python 3.13 FastAPI vision -> speech pipeline (the gating job).
# Android: Kotlin + Jetpack Compose app that talks to the backend; its build
# needs the Meta Wearables SDK from GitHub Packages, so it only runs once the
# GH_PACKAGES_TOKEN secret (a PAT with read:packages) is configured.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so only the latest commit is verified.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — always runs and gates the workflow. Must be green on a fresh repo.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (FastAPI / Python 3.13)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ffmpeg
        # pydub shells out to ffmpeg to read/export MP3 (audio.py); the runner
        # image doesn't guarantee it. The Docker image bakes it in separately.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  # ---------------------------------------------------------------------------
  # Android — Kotlin + Jetpack Compose. The Meta Wearables SDK is resolved from
  # GitHub Packages, which requires auth. Without the GH_PACKAGES_TOKEN secret
  # the build cannot resolve the SDK, so the job cleanly skips its real work
  # (and succeeds) instead of failing the workflow with a red X.
  #
  # `if:` can't read secrets directly, so we project the secret's presence into
  # a job-level env var and gate each meaningful step on it.
  # ---------------------------------------------------------------------------
  android:
    name: Android (Kotlin / Jetpack Compose)
    runs-on: ubuntu-24.04
    env:
      HAS_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Notice when the Meta SDK token is absent
        if: env.HAS_TOKEN != 'true'
        run: |
          echo "::notice title=Android build skipped::The Android build is skipped until the GH_PACKAGES_TOKEN secret is configured."
          echo "The Meta Wearables SDK (com.meta.wearable:mwdat-*) is published to GitHub Packages"
          echo "at https://maven.pkg.github.com/facebook/meta-wearables-dat-android and requires auth."
          echo "Add a repository secret named GH_PACKAGES_TOKEN — a GitHub PAT with the read:packages"
          echo "scope — and this job will build and test the Android app on the next run."

      - name: Check out repository
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        if: env.HAS_TOKEN == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: env.HAS_TOKEN == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests and assemble debug APK
        if: env.HAS_TOKEN == 'true'
        working-directory: ./android
        # settings.gradle.kts reads the token from the github_token gradle
        # property or the GITHUB_TOKEN env var to authenticate to GitHub Packages.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: ./gradlew testDebugUnitTest assembleDebug
